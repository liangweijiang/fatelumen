version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: fatelumen-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: fatelumen
      MYSQL_USER: fatelumen
      MYSQL_PASSWORD: fatelumen123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_0900_ai_ci

  redis:
    image: redis:7-alpine
    container_name: fatelumen-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  mysql_data:
  redis_data:
